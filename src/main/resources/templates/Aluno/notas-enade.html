<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <title>Projeto Gerenciamento Alunos</title>
    <meta name="author" content="Julius Cavalcante">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.2/font/bootstrap-icons.css">
    <script src="https://kit.fontawesome.com/006642858d.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">
</head>
    <body>
        <div th:replace="fragmentos/fragmentos :: cabecalho"></div>

        <div class="container">
        <h3>Notas ENADE</h3>
        
        <hr>

        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th scope="col">Nome</th>
                    <th scope="col">Curso</th>
                    <th scope="col">Status</th>
                    <th scope="col">Nota</th>
                </tr>
            </thead>
            <tbody>
                <tr scope="row" th:each="aluno : ${alunosAtivos}">
                    <td th:text="${aluno.nome}"></td>
                    <td th:text="${aluno.curso}"></td>
                    <td th:text="${aluno.status}"></td>
                    <td th:text="${aluno.notaEnade}"></td>
                </tr>
            </tbody>
            
            <tfoot>
                <tr>
                    <td colspan="3" style="text-align: right;"><strong>Média Total dos Alunos Ativos:</strong></td>
                    <td th:text="${#numbers.formatDecimal(mediaAtivos, 1, 1)}"></td>
                </tr>
            </tfoot>
        </table>
        </div>
        
        <script src="/webjars/jquery/3.6.0/jquery.min.js"></script>
        <script src="/webjars/bootstrap/js/bootstrap.min.js"></script>
    </body>
</html>
