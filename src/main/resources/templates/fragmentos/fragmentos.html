<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<body>

    <header th:fragment="cabecalho">
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top main-nav">
            <div class="container">
                <a th:href="@{/index}" class="navbar-brand d-flex align-items-center">
                    <img src="/img/logo-escola.png" width="50" class="me-2 filter-white"/>
                    <span class="fw-bold fs-4">Academy<span class="text-accent">Spring</span></span>
                </a>
                
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMobile">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div id="navMobile" class="navbar-collapse collapse justify-content-end">
                    <ul class="navbar-nav align-items-center">
                        <li class="nav-item">
                            <a th:href="@{/index}" class="nav-link mx-2"><i class="bi bi-house-door me-1"></i> Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-2" th:href="@{inserirAlunos}"><i class="bi bi-person-plus me-1"></i> Cadastrar</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-2" th:href="@{filtro-alunos}"><i class="bi bi-search me-1"></i> Pesquisar</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-2" th:href="@{filtro-notas-enade}"><i class="bi bi-search me-1"></i> Média Notas ENADE</a>
                        </li>
                        <li class="nav-item ms-lg-3">
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="btn btn-logout d-flex align-items-center">
                                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <footer th:fragment="rodape" class="py-4 mt-auto">
        <div class="container text-center">
            <hr class="border-secondary opacity-25">
            <p class="mb-0 text-muted small">
                &copy; 2026 Academy Spring - Refatorado por <span class="fw-bold text-dark">Mateus Lima</span>
            </p>
            <p class="text-muted extra-small">Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
