<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Gerenciamento de Alunos</title>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div th:replace="fragmentos/fragmentos :: cabecalho"></div>

    <main class="dashboard-wrapper">
        <div class="overlay"></div>
        
        <div class="container content-area">
            <div class="welcome-text text-center mb-5">
                <h1 class="display-4 fw-bold text-white">Painel de Controle</h1>
                <p class="lead text-light">Olá, <span th:text="${session.usuario.nome}"></span>! O que deseja gerenciar hoje?</p>
            </div>

            <div class="row g-4 justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <a th:href="@{inserirAlunos}" class="dashboard-card shadow">
                        <div class="card-icon">
                            <i class="bi bi-person-plus-fill"></i>
                        </div>
                        <h3>Cadastrar Aluno</h3>
                        <p>Adicione novos estudantes ao sistema acadêmico.</p>
                        <span class="btn-action">Acessar <i class="bi bi-arrow-right"></i></span>
                    </a>
                </div>

                <div class="col-md-5 col-lg-4">
                    <div class="dashboard-card shadow" data-toggle="modal" data-target="#modalPesquisa">
                        <div class="card-icon">
                            <i class="bi bi-search"></i>
                        </div>
                        <h3>Encontrar Aluno</h3>
                        <p>Pesquise e filtre alunos cadastrados na base.</p>
                        <span class="btn-action">Pesquisar <i class="bi bi-arrow-right"></i></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalPesquisa" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content glass-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Busca Rápida</h5>
                    <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close"></button>
                </div>
                <form method="post" action="pesquisar-aluno" th:object="${aluno}">
                    <div class="modal-body py-4">
                        <label class="form-label text-muted">Nome do Aluno</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" placeholder="Ex: Mateus Lima" th:field="*{nome}" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-link text-secondary" data-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-main px-4">Pesquisar Agora</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragmentos/fragmentos :: rodape"></div>

    <script src="/webjars/jquery/3.6.0/jquery.min.js"></script>
    <script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
