<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AcademySpring</title>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div th:replace="fragmentos/fragmentos :: cabecalho"></div>

    <main class="dashboard-wrapper">
        <div class="overlay"></div>
        
        <div class="container content-area">
            <div class="welcome-text text-center mb-5">
                <h1 class="display-4 fw-bold text-white">Painel de Controle</h1>
                <p class="lead text-light">Olá! O que deseja gerenciar hoje?</p>
            </div>

           <div class="row g-4 justify-content-center align-items-stretch">
    <div class="col-md-4 d-flex">
        <a th:href="@{/inserirAlunos}" class="dashboard-card shadow w-100">
            <div class="card-icon">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h3>Cadastrar Aluno</h3>
            <p>Adicione novos estudantes ao sistema acadêmico.</p>
            <span class="btn-action">Acessar <i class="bi bi-arrow-right"></i></span>
        </a>
    </div>

    <div class="col-md-4 d-flex">
        <div class="dashboard-card shadow w-100" 
             data-bs-toggle="modal" 
             data-bs-target="#modalPesquisa" 
             style="cursor: pointer;">
            <div class="card-icon">
                <i class="bi bi-search"></i>
            </div>
            <h3>Encontrar Aluno</h3>
            <p>Busca rápida por nome na base de dados.</p>
            <span class="btn-action">Pesquisar <i class="bi bi-arrow-right"></i></span>
        </div>
    </div>

    <div class="col-md-4 d-flex">
        <a th:href="@{/filtros-alunos}" class="dashboard-card shadow w-100">
            <div class="card-icon text-accent">
                <i class="bi bi-filter-square-fill"></i>
            </div>
            <h3>Gerenciar Status</h3>
            <p>Filtre a listagem por alunos ativos ou inativos.</p>
            <span class="btn-action">Ver Filtros <i class="bi bi-arrow-right"></i></span>
        </a>
    </div>
</div>
            </div>
        </div>
    </main>

    <div th:replace="fragmentos/fragmentos :: modalPesquisa"></div>

    <script src="/webjars/jquery/3.6.0/jquery.min.js"></script>
    <script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
